<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>🔧 HRL Tracking API Test</h1>
    
    <div class="test-section">
        <h3>1. Health Check</h3>
        <button onclick="testHealth()">Health Check</button>
        <div id="health-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>2. Collect Endpoint Test</h3>
        <button onclick="testCollect()">Test /collect</button>
        <div id="collect-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h3>3. Stats API Test</h3>
        <button onclick="testStats()">Test /stats/summary</button>
        <div id="stats-result" class="result"></div>
    </div>

    <script>
        const API_BASE = 'https://hrl-tracking-app-production-9cbc.up.railway.app';
        
        function showResult(elementId, success, message, data = null) {
            const element = document.getElementById(elementId);
            element.className = `result ${success ? 'success' : 'error'}`;
            element.innerHTML = `
                <strong>${success ? '✅ Başarılı' : '❌ Hata'}:</strong> ${message}
                ${data ? `<br><pre>${JSON.stringify(data, null, 2)}</pre>` : ''}
            `;
        }
        
        async function testHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                if (response.ok) {
                    showResult('health-result', true, 'Health check başarılı', data);
                } else {
                    showResult('health-result', false, `HTTP ${response.status}: ${data.error || 'Bilinmeyen hata'}`);
                }
            } catch (error) {
                showResult('health-result', false, `Network hatası: ${error.message}`);
            }
        }
        
        async function testCollect() {
            const testData = {
                shopId: 'test-shop.myshopify.com',
                event: 'test_event',
                productHandle: 'test-product',
                buttonId: 'test-button',
                extra: { test: true }
            };
            
            try {
                const response = await fetch(`${API_BASE}/collect`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult('collect-result', true, 'Collect endpoint başarılı', data);
                } else {
                    showResult('collect-result', false, `HTTP ${response.status}: ${data.error || 'Bilinmeyen hata'}`, data);
                }
            } catch (error) {
                showResult('collect-result', false, `Network hatası: ${error.message}`);
            }
        }
        
        async function testStats() {
            try {
                const response = await fetch(`${API_BASE}/stats/summary?shopId=test-shop.myshopify.com`);
                const data = await response.json();
                
                if (response.ok) {
                    showResult('stats-result', true, 'Stats API başarılı', data);
                } else {
                    showResult('stats-result', false, `HTTP ${response.status}: ${data.error || 'Bilinmeyen hata'}`, data);
                }
            } catch (error) {
                showResult('stats-result', false, `Network hatası: ${error.message}`);
            }
        }
        
        // Sayfa yüklendiğinde health check yap
        window.onload = () => {
            testHealth();
        };
    </script>
</body>
</html>

<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <title>Collector Test (GÜNCEL)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; padding: 20px; }
    input, button { padding: 8px 10px; font-size: 14px; }
    .row { margin: 8px 0; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    #log { background:#0b1020; color:#f2f5ff; padding:14px; border-radius:8px; min-height:160px; white-space:pre-wrap; }
    .ok { color:#8fffa8 }
    .err { color:#ff7a7a }
  </style>
</head>
<body>
  <h1>Collector Test (GÜNCEL)</h1>

  <div class="row">
    <b>Endpoint:</b>
    <input id="endpoint" size="48" value="https://hrl-tracking-app-production-9cbc.up.railway.app">
  </div>

  <div class="row">
    <b>Shop ID:</b>
    <input id="shopId" size="28" value="dev-shop.myshopify.com">
    <span style="margin-left:16px"><b>Product handle:</b></span>
    <input id="productHandle" size="18" value="black-mug">
  </div>

  <div class="row">
    <button id="btnPvs">page_view_start (otomatik de gönderilir)</button>
    <button id="btnPve">page_view_end (fetch)</button>
    <button id="btnPveBeacon">page_view_end (sendBeacon)</button>
  </div>

  <div class="row">
    <button id="btnAddToCart">click (add-to-cart)</button>
    <button id="btnDoubleClick">click x2 (await, 200ms ara)</button>
    <span><b>Özel button_id:</b></span>
    <input id="customButton" size="12" value="buy-now">
    <button id="btnCustomClick">click (özel)</button>
  </div>

  <div id="log"></div>

  <script>
    const $ = s => document.querySelector(s);
    const endpointInput = $('#endpoint');
    const shopInput = $('#shopId');
    const handleInput = $('#productHandle');
    const customButtonInput = $('#customButton');
    const log = $('#log');

    function baseUrl() {
      return endpointInput.value.replace(/\/+$/, ''); // sondaki / temizle
    }
    function logLine(txt, ok=false) {
      const span = document.createElement('div');
      span.className = ok ? 'ok' : 'err';
      span.textContent = (ok ? '✓ ' : '✗ ') + txt;
      log.append(span);
      log.append(document.createElement('br'));
      log.scrollTop = log.scrollHeight;
    }

    async function postCollect(payload) {
      const url = baseUrl() + '/collect';
      const body = {
        shopId: shopInput.value.trim(),
        ...payload,                        // event zorunlu burada gelmeli
        productHandle: handleInput.value.trim() || undefined,
      };

      logLine(`fetch sent ${JSON.stringify(body)}`);
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          credentials: 'omit',
        });
        const json = await res.json().catch(() => ({}));
        if (res.ok && json.ok) {
          logLine(`response ${res.status}: ${JSON.stringify(json)}`, true);
        } else {
          logLine(`response ${res.status}: ${JSON.stringify(json)}`);
        }
      } catch (e) {
        logLine(`network error: ${e.message}`);
      }
    }

    function beaconCollect(payload) {
      const url = baseUrl() + '/collect';
      const data = new URLSearchParams();
      data.set('shopId', shopInput.value.trim());
      Object.entries(payload).forEach(([k,v]) => {
        if (typeof v === 'object') data.set(k, JSON.stringify(v));
        else data.set(k, String(v));
      });

      const ok = navigator.sendBeacon(url, data);
      if (ok) logLine(`beacon sent ${JSON.stringify(Object.fromEntries(data))}`, true);
      else logLine('beacon failed to enqueue');
    }

    // Butonlar
    $('#btnPvs').onclick = () => postCollect({
      event: 'page_view_start',
      extra: { route: 'product' },
    });

    $('#btnPve').onclick = () => postCollect({
      event: 'page_view_end',
      extra: { reason: 'manual' },
    });

    $('#btnPveBeacon').onclick = () => beaconCollect({
      event: 'page_view_end',
      extra: { reason: 'beacon' },
    });

    $('#btnAddToCart').onclick = () => postCollect({
      event: 'click',
      buttonId: 'add-to-cart',
    });

    $('#btnDoubleClick').onclick = async () => {
      await postCollect({ event: 'click', buttonId: 'add-to-cart' });
      await new Promise(r => setTimeout(r, 200));
      await postCollect({ event: 'click', buttonId: 'add-to-cart' });
    };

    $('#btnCustomClick').onclick = () => postCollect({
      event: 'click',
      buttonId: customButtonInput.value.trim() || 'buy-now',
    });

    // Sayfa açılışında otomatik ilk görüntüleme
    window.addEventListener('load', () => {
      postCollect({ event: 'page_view_start', extra: { route: 'product' } });
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <title>Collector Test (GÜNCEL)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; padding: 16px; }
    input, button { padding: 6px 10px; font-size: 14px; }
    .row { margin: 8px 0; display:flex; gap:8px; flex-wrap:wrap; }
    .log { background:#0b1120; color:#e5e7eb; padding:12px; border-radius:8px; min-height:220px; white-space:pre-wrap; }
    .ok { color:#34d399; }
    .err { color:#f87171; }
  </style>
</head>
<body>
  <h1>Collector Test (GÜNCEL)</h1>

  <div class="row">
    <label>Endpoint:</label>
    <input id="endpoint" size="55"
           value="https://hrl-tracking-app-production-9cbc.up.railway.app" />
  </div>

  <div class="row">
    <label>Shop ID:</label>
    <input id="shopId" size="30" value="dev-shop.myshopify.com" />
    <label>Product handle:</label>
    <input id="productHandle" size="20" value="black-mug" />
  </div>

  <div class="row">
    <button id="btnStartAuto">page_view_start (otomatik de gönderilir)</button>
    <button id="btnEndFetch">page_view_end (fetch)</button>
    <button id="btnEndBeacon">page_view_end (sendBeacon)</button>
  </div>

  <div class="row">
    <button id="btnAddToCart">click (add-to-cart)</button>
    <button id="btnClickTwice">click x2 (await, 200ms ara)</button>
    <label>Özel button_id:</label>
    <input id="customBtn" size="16" value="buy-now" />
    <button id="btnCustom">click (özel)</button>
  </div>

  <div class="log" id="log"></div>

  <script>
    const $ = sel => document.querySelector(sel);
    const log = (msg, ok=false) => {
      const el = $('#log');
      const line = (ok ? '✓ ' : '✗ ') + msg + '\n';
      const span = document.createElement('span');
      span.className = ok ? 'ok' : 'err';
      span.textContent = line;
      el.appendChild(span);
      el.scrollTop = el.scrollHeight;
    };

    const ep = () => $('#endpoint').value.replace(/\/+$/, '');
    const collectUrl = () => ep() + '/collect';        // Sunucudaki POST endpoint
    const apiCollectUrl = () => ep() + '/api/collect'; // Yedek endpoint

    async function postJSON(url, payload) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        credentials: 'include',
        mode: 'cors',
      });
      return res;
    }

    async function sendEvent(payload) {
      try {
        // Önce /collect
        let res = await postJSON(collectUrl(), payload);
        if (res.ok) {
          log(`response ${res.status}: ${await res.text()}`, true);
          return;
        }
        // Olmazsa /api/collect
        log(`response ${res.status} on /collect, trying /api/collect...`);
        res = await postJSON(apiCollectUrl(), payload);
        const ok = res.ok;
        const body = await res.text();
        log(`response ${res.status} (/api/collect): ${body}`, ok);
      } catch (e) {
        log(`fetch error: ${e.message}`);
      }
    }

    function beacon(payload) {
      try {
        const ok = navigator.sendBeacon(collectUrl(), new Blob(
          [JSON.stringify(payload)], { type:'text/plain' }
        ));
        if (!ok) {
          // sendBeacon başarısızsa fetch’e düş
          sendEvent(payload);
          return;
        }
        log(`beacon sent ${JSON.stringify(payload)}`, true);
      } catch (e) {
        log(`beacon error: ${e.message}`);
      }
    }

    const basePayload = (extra={}) => ({
      shopId: $('#shopId').value.trim(),
      productHandle: $('#productHandle').value.trim(),
      ...extra
    });

    // UI handlers
    $('#btnStartAuto').onclick = () => {
      const p = basePayload({ event:'page_view_start', extra:{ route:'product' } });
      log(`fetch sent ${JSON.stringify(p)}`);
      sendEvent(p);
    };

    $('#btnEndFetch').onclick = () => {
      const p = basePayload({ event:'page_view_end', extra:{ reason:'manual' } });
      log(`fetch sent ${JSON.stringify(p)}`);
      sendEvent(p);
    };

    $('#btnEndBeacon').onclick = () => {
      const p = basePayload({ event:'page_view_end', extra:{ reason:'beacon' } });
      beacon(p);
    };

    $('#btnAddToCart').onclick = () => {
      const p = basePayload({ event:'click', buttonId:'add-to-cart' });
      log(`fetch sent ${JSON.stringify(p)}`);
      sendEvent(p);
    };

    $('#btnClickTwice').onclick = async () => {
      const p = basePayload({ event:'click', buttonId:'add-to-cart' });
      log(`fetch sent ${JSON.stringify(p)}`);
      await sendEvent(p);
      await new Promise(r => setTimeout(r, 200));
      log(`fetch sent ${JSON.stringify(p)}`);
      await sendEvent(p);
    };

    $('#btnCustom').onclick = () => {
      const id = $('#customBtn').value.trim() || 'buy-now';
      const p = basePayload({ event:'click', buttonId:id });
      log(`fetch sent ${JSON.stringify(p)}`);
      sendEvent(p);
    };
  </script>
</body>
</html>

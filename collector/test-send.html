<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <title>HRL Collector Test</title>
  <style>
    body { font-family: system-ui, Arial; padding: 20px; }
    label{display:block;margin-top:10px}
    input, button { padding: 8px; margin: 6px 0; width: 100%; max-width: 520px; }
    pre { background: #111; color: #0f0; padding: 12px; overflow: auto; max-width: 820px; }
  </style>
</head>
<body>
  <h1>HRL Collector Test</h1>

  <label>Base URL (boş bırak: bu domain)</label>
  <input id="baseUrl" placeholder="https://hrl-tracking-app-production-xxxx.up.railway.app" />

  <label>shopId</label>
  <input id="shopId" value="dev-shop.myshopify.com" />

  <label>productHandle</label>
  <input id="productHandle" value="black-mug" />

  <label>buttonId</label>
  <input id="buttonId" value="add-to-cart" />

  <div>
    <button onclick="send('/collect', {event:'page_view_start'})">POST /collect (page_view_start)</button>
    <button onclick="send('/collect', {event:'click'})">POST /collect (click)</button>
    <button onclick="sendBeacon('/collect', {event:'page_view_end'})">sendBeacon /collect (page_view_end)</button>
  </div>

  <h3>Response</h3>
  <pre id="out"></pre>

  <script>
    function getBase() {
      const v = document.getElementById('baseUrl').value.trim();
      return v || window.location.origin;
    }

    async function send(path, base) {
      const body = {
        shopId: document.getElementById('shopId').value,
        productHandle: document.getElementById('productHandle').value || undefined,
        buttonId: document.getElementById('buttonId').value || undefined,
        extra: { via: 'test-page' },
        ...base
      };
      const url = getBase() + path;
      let result;
      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        result = { status: res.status, json: await res.json() };
      } catch (e) {
        result = { error: String(e) };
      }
      document.getElementById('out').textContent =
        JSON.stringify({ url, body, result }, null, 2);
    }

    function sendBeacon(path, base) {
      const body = {
        shopId: document.getElementById('shopId').value,
        productHandle: document.getElementById('productHandle').value || undefined,
        buttonId: document.getElementById('buttonId').value || undefined,
        extra: { via: 'test-page' },
        ...base
      };
      const url = getBase() + path;
      const ok = navigator.sendBeacon(url, new Blob([JSON.stringify(body)], { type: 'text/plain' }));
      document.getElementById('out').textContent =
        JSON.stringify({ url, body, beaconSent: ok }, null, 2);
    }
  </script>
</body>
</html>

<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <title>Collector Test (GÜNCEL)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    h1 { margin-top: 0; }
    button { padding: 8px 12px; margin: 6px 8px 6px 0; }
    input { padding: 6px 8px; }
    .row { margin-bottom: 10px; }
    code { background:#f5f5f5; padding:2px 6px; border-radius:4px; }
  </style>
</head>
<body>
  <h1>Collector Test (GÜNCEL)</h1>

  <div class="row">
    <label>Endpoint: <code id="ep">http://localhost:3000/e</code></label>
  </div>
  <div class="row">
    <label>Shop ID:</label>
    <input id="shop" value="dev-shop.myshopify.com" size="28" />
  </div>
  <div class="row">
    <label>Product handle:</label>
    <input id="handle" value="black-mug" />
  </div>

  <hr>

  <div class="row">
    <button id="btnStart">page_view_start (otomatik de gönderilir)</button>
    <button id="btnEnd">page_view_end (fetch)</button>
    <button id="btnEndBeacon">page_view_end (sendBeacon)</button>
  </div>

  <div class="row">
    <button id="btnClick">click (add-to-cart)</button>
    <button id="btnClick2">click x2 (await, 200ms ara)</button>
  </div>

  <div class="row">
    <label>Özel button_id:</label>
    <input id="customBtn" value="buy-now" />
    <button id="btnCustomClick">click (özel)</button>
  </div>

  <pre id="log" style="background:#0b1021;color:#d5e4f7;padding:12px;border-radius:8px;min-height:100px;"></pre>

<script>
  const endpoint = 'http://localhost:3000/e';
  const logEl = document.getElementById('log');
  const shopEl = document.getElementById('shop');
  const handleEl = document.getElementById('handle');

  let pageStartTs = Date.now();

  function log(...args){
    const line = args.map(v => (typeof v === 'string' ? v : JSON.stringify(v))).join(' ');
    logEl.textContent += line + '\n';
    logEl.scrollTop = logEl.scrollHeight;
    console.log(...args);
  }

  function basePayload(event, extra = {}) {
    return {
      ts: Date.now(),
      shopId: shopEl.value.trim(),
      event,
      url: location.href,
      referrer: document.referrer || '',
      ua: navigator.userAgent,
      productHandle: handleEl.value.trim() || null,
      data: extra
    };
  }

  // fetch ile gönder (keepalive + no-store)
  async function sendFetch(event, extra = {}) {
    const body = basePayload(event, extra);
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Cache-Control': 'no-store'},
      body: JSON.stringify(body),
      keepalive: true
    });
    if (!res.ok && res.status !== 204) {
      const t = await res.text();
      throw new Error(`HTTP ${res.status} ${t}`);
    }
    log('✔ fetch sent', {event, extra});
    return true;
  }

  // sayfa kapanırken daha sağlam: sendBeacon
  function sendBeacon(event, extra = {}) {
    const body = basePayload(event, extra);
    const blob = new Blob([JSON.stringify(body)], { type: 'application/json' });
    const ok = navigator.sendBeacon(endpoint, blob);
    log(ok ? '✔ beacon queued' : '✖ beacon failed', {event, extra});
    return ok;
  }

  // --- Otomatik page_view_start ---
  window.addEventListener('DOMContentLoaded', () => {
    pageStartTs = Date.now();
    sendFetch('page_view_start', { route: 'product' })
      .catch(e => log('ERR start', e.message));
  });

  // --- Sayfa kapanırken dwell ms gönder (beacon) ---
  window.addEventListener('beforeunload', () => {
    const dwell = Date.now() - pageStartTs;
    sendBeacon('page_view_end', { dwell_ms: dwell });
  });

  // --- Butonlar ---
  document.getElementById('btnStart').onclick = () => {
    pageStartTs = Date.now();
    sendFetch('page_view_start', { route: 'product' }).catch(e => log('ERR start', e.message));
  };

  document.getElementById('btnEnd').onclick = () => {
    const dwell = Date.now() - pageStartTs;
    sendFetch('page_view_end', { dwell_ms: dwell }).catch(e => log('ERR end', e.message));
  };

  document.getElementById('btnEndBeacon').onclick = () => {
    const dwell = Date.now() - pageStartTs;
    sendBeacon('page_view_end', { dwell_ms: dwell });
  };

  document.getElementById('btnClick').onclick = () => {
    sendFetch('click', { button_id: 'add-to-cart', text: 'Add to cart' })
      .catch(e => log('ERR click', e.message));
  };

  document.getElementById('btnClick2').onclick = async () => {
    try {
      await sendFetch('click', { button_id: 'add-to-cart', text: 'Add to cart' });
      await new Promise(r => setTimeout(r, 200)); // araya küçük gecikme
      await sendFetch('click', { button_id: 'add-to-cart', text: 'Add to cart' });
      log('two clicks sent (await)');
    } catch (e) {
      log('ERR click x2', e.message);
    }
  };

  document.getElementById('btnCustomClick').onclick = () => {
    const id = (document.getElementById('customBtn').value || 'custom').trim();
    sendFetch('click', { button_id: id }).catch(e => log('ERR custom', e.message));
  };
</script>
</body>
</html>
